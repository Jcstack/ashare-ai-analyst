# Impact Chain Templates Configuration
# Per PRD v34.0 FR-GI002: Event-to-asset transmission chain templates
# These supplement the code-defined CHAIN_TEMPLATES in impact_chain.py

# Template override/extension (merged with code defaults)
# Format: template_key -> {trigger_type, paths[]}
# See src/intelligence/impact_chain.py for full dataclass spec

# Event keyword → template mapping
keywords:
  oil_surge: ["原油", "油价", "OPEC", "石油", "oil"]
  usd_strengthen: ["美元走强", "美元升值", "DXY上涨", "dollar rally"]
  usd_weaken: ["美元走弱", "美元贬值", "DXY下跌"]
  geopolitical_war: ["战争", "冲突", "军事", "袭击", "制裁", "入侵"]
  fed_hawkish: ["加息", "鹰派", "紧缩", "hawkish", "rate hike"]
  fed_dovish: ["降息", "鸽派", "宽松", "dovish", "rate cut"]
  gold_surge: ["黄金大涨", "金价飙升", "gold surge"]

