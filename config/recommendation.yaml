# v28.0 智能选股推荐系统配置
# Style definitions, session mappings, and screening thresholds

styles:
  value:
    label: "价值投资"
    filters:
      pe_max: 25
      pb_max: 3
      div_yield_min: 2.0
    weights:
      pe_score: 0.25
      pb_score: 0.2
      dividend: 0.2
      stability: 0.2
      data_quality: 0.15

  growth:
    label: "成长投资"
    filters:
      revenue_growth_min: 15
      profit_growth_min: 20
    weights:
      revenue_growth: 0.25
      profit_growth: 0.25
      pe_relative: 0.2
      momentum: 0.15
      data_quality: 0.15

  momentum:
    label: "动量交易"
    filters:
      change_pct_min: 1
      volume_ratio_min: 1.2
      turnover_min: 2
    weights:
      price_momentum: 0.3
      volume_momentum: 0.25
      turnover: 0.15
      trend: 0.15
      data_quality: 0.15

  swing:
    label: "波段交易"
    filters:
      atr_pct_min: 2
      turnover_min: 2
    weights:
      volatility: 0.25
      support_distance: 0.2
      volume_pattern: 0.2
      trend: 0.2
      data_quality: 0.15

  dividend:
    label: "红利收息"
    filters:
      div_yield_min: 3.0
      payout_years_min: 3
    weights:
      yield: 0.35
      payout_stability: 0.25
      pe_score: 0.15
      growth: 0.1
      data_quality: 0.15

  sector:
    label: "板块轮动"
    filters: {}
    weights:
      sector_momentum: 0.3
      relative_strength: 0.25
      flow_score: 0.15
      pe_relative: 0.15
      data_quality: 0.15

  # Ultra-short style (I-090 Phase 3): 1-3 day holding, T+1 optimized
  ultra_short:
    label: "超短线"
    filters:
      change_pct_min: 0.5
      change_pct_max: 5.0     # Hard cap: reject stocks already up >5% today
      volume_ratio_min: 1.5
      turnover_min: 3
    weights:
      volume_momentum: 0.25
      turnover: 0.20
      trend: 0.15
      stability: 0.15          # Penalize excessive volatility
      sector_momentum: 0.10
      data_quality: 0.15

sessions:
  pre_market:
    start: "07:00"
    end: "09:29"
    styles: ["value", "dividend", "sector"]
  early:
    start: "09:30"
    end: "10:30"
    styles: ["momentum", "swing", "sector", "ultra_short"]
  mid:
    start: "10:30"
    end: "14:00"
    styles: ["value", "growth", "swing", "ultra_short"]
  late:
    start: "14:00"
    end: "15:00"
    styles: ["momentum", "swing", "ultra_short"]
  post_market:
    start: "15:00"
    end: "17:00"
    styles: ["value", "growth", "dividend"]
  # Fallback session for outside trading hours — fundamental-based styles only
  anytime:
    styles: ["value", "growth", "dividend", "sector"]

screening:
  max_candidates_per_style: 20
  final_picks_per_style: 5
  min_score: 0.45             # lowered from 0.6 — weighted averages typically 0.3-0.5
  max_per_sector: 3           # prevent single-sector dominance
  # Exclude stocks by exchange — remove entry when you gain trading permission
  # Options: bse (北交所), star (科创板), chinext (创业板)
  exclude_exchanges: ["bse", "chinext", "star"]

# Trading profile — controls T+1 risk and intraday drift filters (I-090)
trading_profile:
  # Trading horizon: ultra_short (1-3d) | short (1-2w) | medium (1-3m) | long (3m+)
  horizon: ultra_short
  # Stocks with intraday gain exceeding this threshold are downgraded to "watch"
  max_intraday_chasing: 5.0
  # Stocks at limit-up are excluded from "buy" (downgraded to "watch")
  filter_limit_up: true
  # Limit-up thresholds per board type (auto-detected from symbol prefix)
  limit_up_pct:
    main: 10.0       # 主板 (sh/sz 60xxxx, 00xxxx)
    chinext: 20.0    # 创业板 (300/301)
    star: 20.0       # 科创板 (688/689)
